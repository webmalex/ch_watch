name: Bug report
description: Report a reproducible bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and the observed behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe the behavior you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Include the exact command, SQL file shape, and relevant flags.
      placeholder: |
        ch_watch run ./query.sql --dry-run
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ch_watch version
      description: Output of `ch_watch version`.
      placeholder: ch_watch v0.7.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS and architecture
      placeholder: macOS/arm64, Linux/amd64, etc.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant terminal output, watcher events, or ClickHouse errors.
      render: shell
