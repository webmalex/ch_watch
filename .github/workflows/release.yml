name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --generate-release-notes --verify-tag

  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64
    env:
      GOOS: ${{ matrix.os }}
      GOARCH: ${{ matrix.arch }}
      CGO_ENABLED: "0"
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          BINARY="ch_watch"
          if [ "$GOOS" = "windows" ]; then BINARY="ch_watch.exe"; fi
          go build -ldflags "-s -w -X github.com/webmalex/ch_watch/internal/version.Version=${VERSION}" -o "$BINARY" ./cmd/ch_watch

      - name: Package (tar.gz)
        if: matrix.os != 'windows'
        run: |
          VERSION="${TAG#v}"
          tar -czf "ch_watch_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz" ch_watch

      - name: Package (zip)
        if: matrix.os == 'windows'
        run: |
          VERSION="${TAG#v}"
          zip "ch_watch_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}.zip" ch_watch.exe

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            ASSET="ch_watch_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}.zip"
          else
            ASSET="ch_watch_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz"
          fi
          gh release upload "$TAG" "$ASSET" --clobber
